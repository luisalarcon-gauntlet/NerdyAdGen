version: "3.9"

services:
  app:
    build: .
    env_file: .env
    command: >
      sh -c "alembic upgrade head && python main.py run --mode v1"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  scraper:
    build: .
    env_file: .env
    command: python main.py scrape
    volumes:
      - ./data:/app/data

  score-competitors:
    build: .
    env_file: .env
    command: python main.py score-competitors
    volumes:
      - ./data:/app/data

  generate-ads:
    build: .
    env_file: .env
    command: python main.py generate-ads
    volumes:
      - ./data:/app/data

  feedback-loop:
    build: .
    env_file: .env
    command: python main.py run-pipeline
    volumes:
      - ./data:/app/data

  generate-report:
    build: .
    env_file: .env
    command: python main.py generate-report
    volumes:
      - ./data:/app/data
